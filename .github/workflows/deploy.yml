name: Build & Deploy to Azure App Service

on:
  push:
    branches:
      - main
      - feature/notifications-service   # tạm thời để test, xóa sau khi merge


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/interacthub-api
  AZURE_WEBAPP_NAME: interacthub-api-123   # ← tên App Service của bạn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Build & push image lên GitHub Container Registry ──────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── 2. Deploy lên Azure App Service bằng Publish Profile ─────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
