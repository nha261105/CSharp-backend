  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  backend:
    build: .
    container_name: interacthub-api
    ports:
      - "5000:8080"
    # depends_on đã xóa – dùng Azure SQL Database, không cần container local
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=${JwtSettings__Issuer}
      - JwtSettings__Audience=${JwtSettings__Audience}
      - JwtSettings__ExpirationInMinutes=${JwtSettings__ExpirationInMinutes}
      - AllowedOrigins=${AllowedOrigins}
      - AzureBlobStorage__ConnectionString=${AzureBlobStorage__ConnectionString}
      - AzureBlobStorage__ContainerName=${AzureBlobStorage__ContainerName}
    restart: unless-stopped

