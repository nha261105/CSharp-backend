version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: interacthub-sqlserver
    environment:
      SA_PASSWORD: "interacthub@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'interacthub@123' -Q 'SELECT 1' -No",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver_data:
